<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Centro de Capacitación</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

</head>

<body class="bg-gray-100">
<div id="root"></div>

<script>
const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_PROYECTO.firebaseapp.com",
  projectId: "TU_PROYECTO",
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();
const auth = firebase.auth();

// 🔐 LOGIN AUTOMÁTICO
auth.signInAnonymously()
.then(() => console.log("Usuario autenticado"))
.catch(err => console.error(err));

// 🔥 GUARDAR CERTIFICACIÓN
window.guardarCertificacion = async function(usuario, modulo, puntaje) {

  if (!auth.currentUser) {
    throw new Error("No autenticado");
  }

  return db.collection("certificaciones").add({
    nombre: usuario.nombre,
    dni: usuario.dni,
    sector: usuario.sector,
    modulo: modulo,
    puntaje: puntaje,
    aprobado: puntaje >= 80,
    fecha: firebase.firestore.FieldValue.serverTimestamp(),
    userId: auth.currentUser.uid
  });
};
</script>

<script type="text/babel">

const { useState, useEffect } = React;

const App = () => {

  const [user, setUser] = useState({nombre:'', dni:'', sector:''});
  const [view, setView] = useState('login');
  const [data, setData] = useState([]);
  const [guardando, setGuardando] = useState(false);

  // 📊 DASHBOARD EN TIEMPO REAL
  useEffect(() => {
    const unsub = db.collection("certificaciones")
      .orderBy("fecha","desc")
      .onSnapshot(snap => {
        const arr = snap.docs.map(d => ({id:d.id, ...d.data()}));
        setData(arr);
      });

    return () => unsub();
  }, []);

  const guardar = async () => {
    setGuardando(true);
    await window.guardarCertificacion(user, "Modulo 1", Math.floor(Math.random()*100));
    setGuardando(false);
  };

  // LOGIN
  if(view === 'login'){
    return (
      <div className="h-screen flex items-center justify-center">
        <div className="bg-white p-8 rounded shadow w-80">
          <input placeholder="Nombre" className="w-full mb-3 p-2 border"
            onChange={e=>setUser({...user,nombre:e.target.value})}/>
          <input placeholder="DNI" className="w-full mb-3 p-2 border"
            onChange={e=>setUser({...user,dni:e.target.value})}/>
          <input placeholder="Sector" className="w-full mb-3 p-2 border"
            onChange={e=>setUser({...user,sector:e.target.value})}/>
          
          <button onClick={()=>setView('home')}
            className="bg-blue-600 text-white w-full p-2">
            Ingresar
          </button>
        </div>
      </div>
    );
  }

  // HOME
  if(view === 'home'){
    return (
      <div className="p-6">
        <h1 className="text-2xl font-bold mb-4">Bienvenido {user.nombre}</h1>

        <button onClick={guardar}
          className="bg-green-600 text-white px-4 py-2 mb-4">
          Simular evaluación
        </button>

        {guardando && <p>Guardando...</p>}

        <button onClick={()=>setView('dashboard')}
          className="bg-black text-white px-4 py-2 ml-4">
          Ver Dashboard
        </button>
      </div>
    );
  }

  // DASHBOARD
  return (
    <div className="p-6">
      <h2 className="text-xl font-bold mb-4">Dashboard</h2>

      <table className="w-full bg-white shadow">
        <thead>
          <tr className="bg-gray-200">
            <th>Nombre</th>
            <th>DNI</th>
            <th>Sector</th>
            <th>Puntaje</th>
            <th>Estado</th>
          </tr>
        </thead>
        <tbody>
          {data.map(d => (
            <tr key={d.id} className="border-t">
              <td>{d.nombre}</td>
              <td>{d.dni}</td>
              <td>{d.sector}</td>
              <td>{d.puntaje}</td>
              <td>{d.aprobado ? "✅" : "❌"}</td>
            </tr>
          ))}
        </tbody>
      </table>

      <button onClick={()=>setView('home')}
        className="mt-4 bg-gray-800 text-white px-4 py-2">
        Volver
      </button>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);

</script>
</body>
</html>
